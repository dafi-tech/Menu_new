# Builds the site and commits the output to docs/ on main.
#
# REQUIRED in the repo (one-time):
# Settings → Actions → General → Workflow permissions → "Read and write permissions" → Save.
# Settings → Pages → Build and deployment → Source: "Deploy from a branch"
#   → Branch: main, folder: /docs → Save.
#
# Site URL: https://<owner>.github.io/<repo>/

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-docs
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to docs/ on main
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: main
          folder: dist
          target-folder: docs
          clean: true
          commit-message: 'chore: deploy site to docs [skip ci]'
